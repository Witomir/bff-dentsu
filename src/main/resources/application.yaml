spring:
  application:
    name: bff
  messages:
    fallback-to-system-locale: false
  cache:
    type: caffeine
    cache-names: products
    caffeine:
      spec: maximumSize=500,expireAfterWrite=5m
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          catalog:
            connect-timeout: 1000
            read-timeout: 5000
          pricing:
            connect-timeout: 1000
            read-timeout: 1000

services:
  catalog:
    url: ${CATALOG_URL:http://localhost:9002}
  pricing:
    url: ${PRICING_URL:http://localhost:9001}

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 3

management:
  endpoints:
    web:
      exposure:
        include: health, info
  health:
    circuitbreakers:
      enabled: true
